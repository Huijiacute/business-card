<!DOCTYPE html>
<html lang="en">
<head>
  <title>Huijia Business Card</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <!-- First card -->
  <div class="card">
    <div class="container">
      <div class="flex">
        <img src="jia_card.jpg" alt="jia_card" class="jia_img">
        <div class="text">
          <h3>Lim Houykea</h3>
          <p class="fullstack">Fullstack Developer</p>
          <h4>Phnom Penh, Cambodia</h4>
        </div>
      </div>
    </div>
    <div class="baby_blue"></div>
  </div>

  <!-- Second card -->
  <div class="card-div">
    <img 
      src="jia_card.jpg" 
      alt="Picture of Houykea as a fullstack developer" 
      class="avatar">
    <div>
      <h3>Lim Houykea</h3>
      <p>Fullstack Developer</p>
      <h4>Phnom Penh, Cambodia</h4>
    </div>
  </div>

  <!-- Third card -->
  <div class="third-card">
    <img src="avatar_jia.jpg" alt="A picture of Lim Houykea" class="jia_image">
    <div>
      <h3>Lim Houykea</h3>
      <p>Fullstack Developer</p>
      <h4>Phnom Penh, Cambodia</h4>
    </div>
  </div>
</body>
</html>
